kind = "web"
previewPath = "/"
title = "ShelfMaster"
version = "1.0.0"
id = "artifacts/shelfmaster"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22408

[services.development]
run = "pnpm --filter @workspace/shelfmaster run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shelfmaster", "run", "build" ]
publicDir = "artifacts/shelfmaster/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22408"
BASE_PATH = "/"
